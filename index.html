<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CoAt" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>CoAt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#F0EDE8;--surface:#E8E4DD;--slab:#DEDAD2;--border:#C0BBB2;
      --fog:#6B6860;--text:#1A1A18;--accent:#3D6B35;--mid:#527A49;--rust:#8B3A1A;
      --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;margin:0;padding:0;background:var(--bg);color:var(--text);
      font-family:'Courier Prime',monospace;overscroll-behavior:none;-webkit-overflow-scrolling:touch;
      transition:background .55s ease,color .55s ease;}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.45;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");}

    /* transitions */
    .tr{transition:background .55s ease,color .55s ease,border-color .55s ease;}

    /* toggle track */
    .tog-track{width:210px;height:38px;background:var(--surface);border:1px solid var(--border);
      position:relative;cursor:pointer;display:flex;align-items:center;
      transition:background .55s ease,border-color .55s ease;}
    .tog-thumb{position:absolute;width:calc(50% - 2px);height:calc(100% - 4px);
      top:2px;left:2px;background:var(--accent);z-index:1;
      transition:transform .42s cubic-bezier(.34,1.4,.64,1),background .55s ease;}
    .tog-thumb.right{transform:translateX(105px);}
    .tog-lbl{position:relative;z-index:2;flex:1;text-align:center;
      font-family:'Bebas Neue',sans-serif;font-size:.88rem;letter-spacing:.12em;
      pointer-events:none;transition:color .3s ease;}

    /* tab bar */
    .tab-bar{display:flex;border-bottom:2px solid var(--border);background:var(--surface);
      flex-shrink:0;transition:background .55s ease,border-color .55s ease;}
    .tab-btn{flex:1;padding:.75rem 0;font-family:'Bebas Neue',sans-serif;font-size:1rem;
      letter-spacing:.12em;text-align:center;cursor:pointer;background:transparent;border:none;
      color:var(--fog);border-bottom:2px solid transparent;margin-bottom:-2px;
      transition:color .2s ease,border-color .2s ease;}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

    /* picker */
    .picker-wrap{position:relative;height:196px;overflow:hidden;}
    .picker-scroll{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;
      -webkit-overflow-scrolling:touch;scrollbar-width:none;padding:78px 0;}
    .picker-scroll::-webkit-scrollbar{display:none;}
    .picker-item{height:40px;display:flex;align-items:center;justify-content:center;
      scroll-snap-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.45rem;
      letter-spacing:.08em;color:var(--fog);cursor:pointer;
      transition:color .2s ease,font-size .2s ease;user-select:none;}
    .picker-item.sel{color:var(--text);font-size:1.85rem;}
    .picker-fade-top{position:absolute;top:0;left:0;right:0;height:78px;
      background:linear-gradient(to bottom,var(--bg),transparent);pointer-events:none;z-index:2;
      transition:background .55s ease;}
    .picker-fade-bot{position:absolute;bottom:0;left:0;right:0;height:78px;
      background:linear-gradient(to top,var(--bg),transparent);pointer-events:none;z-index:2;
      transition:background .55s ease;}
    .picker-sel-line{position:absolute;top:50%;left:1.25rem;right:1.25rem;
      height:40px;margin-top:-20px;border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);pointer-events:none;z-index:3;
      transition:border-color .55s ease;}

    /* chip */
    .chip{padding:.55rem 1.1rem;border:1px solid var(--border);background:var(--surface);
      color:var(--fog);font-family:'Courier Prime',monospace;font-size:.8rem;
      letter-spacing:.08em;text-transform:uppercase;cursor:pointer;position:relative;
      transition:all .15s ease;user-select:none;}
    .chip::after{content:'';position:absolute;bottom:-1px;right:-1px;width:7px;height:7px;
      background:var(--bg);clip-path:polygon(100% 0,100% 100%,0 100%);transition:background .55s ease;}
    .chip.on{border-color:var(--accent);background:var(--bg);color:var(--accent);}

    /* cta */
    .btn-cta{width:100%;padding:1.2rem 1.5rem;background:var(--accent);color:var(--bg);
      border:none;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.12em;
      cursor:pointer;position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:space-between;
      transition:background .55s ease,color .55s ease;}
    .btn-cta::after{content:'';position:absolute;bottom:0;right:0;width:10px;height:10px;
      background:var(--bg);clip-path:polygon(100% 0,100% 100%,0 100%);transition:background .55s ease;}
    .btn-cta:disabled{background:var(--slab);color:var(--border);cursor:not-allowed;}
    .btn-cta:not(:disabled):active{opacity:.85;}

    /* workout block */
    .w-block{background:var(--surface);border-left:4px solid var(--accent);
      margin-bottom:1.1rem;position:relative;overflow:hidden;
      transition:background .55s ease,border-color .55s ease;}
    .w-block::before{content:'';position:absolute;inset:0;pointer-events:none;
      background:repeating-linear-gradient(180deg,transparent 0,transparent 4px,rgba(0,0,0,.03) 4px,rgba(0,0,0,.03) 5px);}

    /* exercise row — bigger */
    .ex-row{cursor:pointer;border-bottom:1px solid var(--border);
      transition:background .15s ease,border-color .55s ease;}
    .ex-row:last-child{border-bottom:none;}
    .ex-row:active{background:var(--slab);}
    .ex-main{padding:.9rem 1.1rem;display:flex;justify-content:space-between;align-items:center;}
    .ex-name{font-size:1rem;color:var(--text);font-weight:700;line-height:1.3;
      transition:color .55s ease;}
    .ex-sets{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.05em;
      white-space:nowrap;flex-shrink:0;transition:color .55s ease;}
    .chev{transition:transform .3s ease,color .55s ease;display:inline-flex;align-items:center;justify-content:center;
      font-size:.75rem;margin-left:.5rem;}
    .chev.open{transform:rotate(180deg);}

    /* info card */
    .info-card{max-height:0;overflow:hidden;background:var(--slab);
      transition:max-height .4s cubic-bezier(.4,0,.2,1),background .55s ease;}
    .info-card.open{max-height:500px;border-top:1px solid var(--border);}
    .info-text{padding:1rem 1.1rem;font-size:.82rem;color:var(--fog);
      line-height:1.8;font-style:italic;transition:color .55s ease,background .55s ease;}

    /* pre-config hiit button */
    .btn-hiit{display:flex;align-items:center;gap:.5rem;padding:.65rem 1.1rem;
      background:transparent;border:1px solid var(--accent);color:var(--accent);
      font-family:'Courier Prime',monospace;font-size:.75rem;letter-spacing:.1em;
      text-transform:uppercase;cursor:pointer;width:100%;
      transition:all .15s ease;}
    .btn-hiit:active{background:rgba(0,0,0,.05);}

    /* secondary btns */
    .btn-sec{flex:1;padding:.95rem 1rem;background:transparent;color:var(--fog);
      border:1px solid var(--border);font-family:'Courier Prime',monospace;
      font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
      transition:all .15s ease;}
    .btn-sec:active{background:var(--surface);}
    .btn-alt{flex:1;padding:.95rem 1rem;background:transparent;color:var(--accent);
      border:1px solid var(--accent);font-family:'Courier Prime',monospace;
      font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
      opacity:.75;transition:all .15s ease;}
    .btn-alt:active{opacity:1;}

    /* ── HIIT TIMER ── */
    .timer-ring-wrap{display:flex;align-items:center;justify-content:center;margin:1.5rem 0;}
    .timer-circle{position:relative;width:220px;height:220px;}
    .timer-svg{transform:rotate(-90deg);}
    .ring-bg{fill:none;stroke:var(--slab);stroke-width:10;transition:stroke .55s ease;}
    .ring-prog{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:butt;
      transition:stroke-dashoffset .5s linear,stroke .55s ease;}
    .timer-inner{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:.15rem;}
    .timer-time{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;line-height:1;
      color:var(--text);transition:color .55s ease;}
    .timer-phase{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--accent);transition:color .55s ease;}
    .timer-round{font-size:.65rem;letter-spacing:.12em;color:var(--fog);
      transition:color .55s ease;}

    /* timer controls */
    .timer-ctrl{display:flex;gap:.75rem;justify-content:center;margin-bottom:1.5rem;}
    .tc-btn{width:56px;height:56px;border:1px solid var(--border);background:var(--surface);
      color:var(--text);font-size:1.4rem;cursor:pointer;display:flex;
      align-items:center;justify-content:center;
      transition:background .15s ease,border-color .55s ease,color .55s ease;}
    .tc-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);
      width:70px;height:70px;font-size:1.8rem;}
    .tc-btn:active{opacity:.8;}

    /* hiit config inputs */
    .t-input{background:var(--surface);border:1px solid var(--border);color:var(--text);
      font-family:'Bebas Neue',sans-serif;font-size:1.4rem;text-align:center;
      padding:.4rem;width:72px;outline:none;
      transition:background .55s ease,border-color .55s ease,color .55s ease;}
    .t-input:focus{border-color:var(--accent);}

    /* exercise queue */
    .q-item{padding:.75rem 1rem;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:.75rem;
      transition:background .55s ease,border-color .55s ease;}
    .q-item.active-ex{background:rgba(0,0,0,.04);}
    .q-num{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--fog);
      width:1.5rem;text-align:center;flex-shrink:0;transition:color .55s ease;}
    .q-num.cur{color:var(--accent);}
    .q-name{font-size:.88rem;color:var(--text);flex:1;transition:color .55s ease;}
    .q-dur{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--fog);
      flex-shrink:0;transition:color .55s ease;}

    /* hiit exercise chips */
    .hchip{padding:.5rem .9rem;border:1px solid var(--border);background:var(--surface);
      color:var(--fog);font-family:'Courier Prime',monospace;font-size:.72rem;
      letter-spacing:.06em;cursor:pointer;user-select:none;
      transition:all .15s ease;}
    .hchip.on{border-color:var(--accent);background:var(--bg);color:var(--accent);}

    /* screens */
    .screen{animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .blk-in{animation:blkIn .35s cubic-bezier(.16,1,.3,1) both;}
    @keyframes blkIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

    /* loading */
    .lcell{width:14px;height:14px;background:var(--slab);animation:lp 1.2s ease infinite;transition:background .55s ease;}
    @keyframes lp{0%,100%{background:var(--slab)}50%{background:var(--accent)}}
    .lcell:nth-child(1){animation-delay:0s}.lcell:nth-child(2){animation-delay:.1s}.lcell:nth-child(3){animation-delay:.2s}
    .lcell:nth-child(4){animation-delay:.3s}.lcell:nth-child(5){animation-delay:.4s}.lcell:nth-child(6){animation-delay:.5s}
    .lcell:nth-child(7){animation-delay:.6s}.lcell:nth-child(8){animation-delay:.7s}.lcell:nth-child(9){animation-delay:.8s}

    ::-webkit-scrollbar{width:2px;}
    ::-webkit-scrollbar-thumb{background:var(--border);}

    /* sun/moon icon */
    .theme-icon{width:34px;height:34px;cursor:pointer;display:flex;align-items:center;
      justify-content:center;font-size:1.15rem;border:1px solid var(--border);
      background:var(--surface);transition:all .3s ease;flex-shrink:0;}
    .theme-icon:active{opacity:.7;}
  </style>
</head>
<body>
<div id="app" style="max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;transition:background .55s ease;">

  <!-- HEADER -->
  <div id="hdr" style="padding:calc(var(--safe-top) + 2.2rem) 1.25rem 1rem;border-bottom:2px solid var(--border);flex-shrink:0;position:relative;overflow:hidden;background:var(--surface);transition:background .55s ease,border-color .55s ease;">
    <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--accent),var(--mid),var(--accent));transition:background .55s ease;"></div>
    <div style="position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);pointer-events:none;"></div>
    <div style="position:relative;display:flex;align-items:flex-start;justify-content:space-between;">
      <div style="padding-left:.75rem;">
        <div style="font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-bottom:.25rem;transition:color .55s ease;">// custom output trainer</div>
        <div style="display:flex;align-items:baseline;">
          <span style="font-family:'Bebas Neue',sans-serif;font-size:3.6rem;line-height:.85;color:var(--text);transition:color .55s ease;">Co</span>
          <span style="font-family:'Fraunces',serif;font-size:1.75rem;font-weight:300;font-style:italic;color:var(--accent);margin-left:.1rem;align-self:flex-end;margin-bottom:.2rem;transition:color .55s ease;">At</span>
        </div>
        <div id="hdr-sub" style="font-size:.55rem;letter-spacing:.08em;color:var(--fog);margin-top:.2rem;transition:color .55s ease;">Grounded. Loaded. Yours.</div>
      </div>
      <!-- sun/moon -->
      <div class="theme-icon" onclick="toggleDark()" id="dk-icon" title="Toggle dark/light" style="color:var(--text);transition:color .55s ease;"><span id="icon-sun"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg></span><span id="icon-moon" style="display:none;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span></div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-build" onclick="switchTab('build')">Build</button>
    <button class="tab-btn" id="tab-timer" onclick="switchTab('timer')">Timer</button>
  </div>

  <!-- SCROLL -->
  <div id="scroll-area" style="flex:1;overflow-y:auto;padding:1.4rem 1.25rem calc(var(--safe-bottom) + 2rem);-webkit-overflow-scrolling:touch;">
    <!-- BUILD TAB -->
    <div id="tab-build-content">
      <div id="scr-cfg" class="screen"></div>
      <div id="scr-res" class="screen" style="display:none;"></div>
    </div>
    <!-- TIMER TAB -->
    <div id="tab-timer-content" style="display:none;">
      <div id="scr-timer" class="screen"></div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loader" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.1);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:center;justify-content:center;flex-direction:column;gap:1.25rem;z-index:998;">
  <div style="padding:2rem;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:1.25rem;transition:background .55s ease,border-color .55s ease;">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;">
      <div class="lcell"></div><div class="lcell"></div><div class="lcell"></div>
      <div class="lcell"></div><div class="lcell"></div><div class="lcell"></div>
      <div class="lcell"></div><div class="lcell"></div><div class="lcell"></div>
    </div>
    <div style="font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--fog);transition:color .55s ease;">compiling session...</div>
  </div>
</div>

<script>
// ─── THEME SYSTEM ──────────────────────────────────────────────────────────────
// 4 themes: def-light, def-dark, str-light, str-dark
const PALETTES = {
  'def-light': {
    bg:'#F0EDE8',surface:'#E8E4DD',slab:'#DEDAD2',border:'#C0BBB2',
    fog:'#6B6860',text:'#1A1A18',accent:'#3D6B35',mid:'#527A49',rust:'#8B3A1A',
    name:'Definition',sub:'Grounded. Loaded. Yours.',
  },
  'def-dark': {
    bg:'#141A12',surface:'#1A2218',slab:'#202C1E',border:'#2E3E2A',
    fog:'#7A8A76',text:'#D8E8D0',accent:'#5A9E4A',mid:'#4A8A3A',rust:'#C06030',
    name:'Definition',sub:'Grounded. Loaded. Yours.',
  },
  'str-light': {
    bg:'#F5F0E8',surface:'#EDE8DC',slab:'#E2DBD0',border:'#C8BFB0',
    fog:'#7A7060',text:'#1E1A14',accent:'#C47B1A',mid:'#A66010',rust:'#8B3A1A',
    name:'Strength',sub:'Heavy. Intentional. Yours.',
  },
  'str-dark': {
    bg:'#181614',surface:'#211F1C',slab:'#2C2925',border:'#3D3830',
    fog:'#7A7168',text:'#F2EBD9',accent:'#C47B1A',mid:'#A66010',rust:'#C0522D',
    name:'Strength',sub:'Heavy. Intentional. Yours.',
  },
};

let workMode = 'def';   // 'def' | 'str'
let darkMode = false;

function themeKey() { return workMode + (darkMode ? '-dark' : '-light'); }

function applyTheme() {
  const t = PALETTES[themeKey()];
  const s = document.documentElement.style;
  Object.entries({
    '--bg':t.bg,'--surface':t.surface,'--slab':t.slab,'--border':t.border,
    '--fog':t.fog,'--text':t.text,'--accent':t.accent,'--mid':t.mid,'--rust':t.rust,
  }).forEach(([k,v]) => s.setProperty(k,v));
  document.getElementById('hdr-sub').textContent = t.sub;
  document.getElementById('icon-sun').style.display = darkMode ? 'none' : '';
  document.getElementById('icon-moon').style.display = darkMode ? '' : 'none';
  // toggle labels
  const isStr = workMode === 'str';
  const lD = document.getElementById('lbl-d');
  const lS = document.getElementById('lbl-s');
  const thumb = document.getElementById('t-thumb');
  if (lD) lD.style.color = isStr ? t.fog : t.bg;
  if (lS) lS.style.color = isStr ? t.bg : t.fog;
  if (thumb) thumb.classList.toggle('right', isStr);
}

function toggleDark() {
  darkMode = !darkMode;
  applyTheme();
}

function toggleWorkMode() {
  workMode = workMode === 'def' ? 'str' : 'def';
  applyTheme();
  // only on config screen — safe to re-render
  if (document.getElementById('scr-cfg').style.display !== 'none') renderConfig();
}

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const SLOTS = [
  {l:'15 min',v:15},{l:'30 min',v:30},{l:'45 min',v:45},
  {l:'1 hour',v:60},{l:'1h 15m',v:75},{l:'1h 30m',v:90},
  {l:'1h 45m',v:105},{l:'2 hours',v:120},{l:'2h 15m',v:135},{l:'2h 30m',v:150},
];
const MUSCLES = [
  {id:'chest',l:'Chest'},{id:'back',l:'Back'},{id:'shoulders',l:'Shoulders'},
  {id:'biceps',l:'Biceps'},{id:'triceps',l:'Triceps'},{id:'legs',l:'Legs'},
];

// ─── EXERCISE LIBRARY ─────────────────────────────────────────────────────────
// Each module: n=name, d=definition prescription, s=strength prescription, i=form info
// Chest: 11 modules | Back: 10 modules | Triceps: 9 modules | Biceps: 9 modules
// Shoulders: 5 modules | Legs: 7 modules | Abs: 6 modules
const EX = {

  // ═══════════════════════════════════════════════════════
  // CHEST — 11 modules
  // Primary drivers: pec major (sternal + clavicular heads)
  // Science: horizontal press = primary mass builder; incline = upper pec;
  // cable/machine = constant tension isolation for definition
  // ═══════════════════════════════════════════════════════

  benchPress: {
    n:'Barbell Bench Press',
    d:'4 × 8–12 (75s)',
    s:'5 × 3–5 (3 min)',
    i:'The foundational horizontal push. Grip just outside shoulder-width — too wide reduces ROM, too narrow shifts load to triceps. Retract and depress the scapula hard into the bench before unracking, and maintain that retraction throughout every rep. This is not optional — losing scapular position is how shoulders get hurt. Bar path is a slight diagonal: touch mid-to-lower chest, press in a shallow arc back to start. On the descent, control over 2 seconds. Drive feet aggressively into the floor and think about spreading the bar apart as you press. At full extension, do not hyperextend elbows — stop just short of lockout to keep pec tension. The bench press is the single highest-load chest exercise available and should always be performed first when energy is highest.',
  },
  inclineDB: {
    n:'Incline Dumbbell Press',
    d:'3 × 10–12 (60s)',
    s:'4 × 6–8 (2 min)',
    i:'Set the bench to 30–45°. Beyond 45° the anterior deltoid takes over from the clavicular pec head — keep it at or below 45°. Start with dumbbells at chest level, elbows at 45° from torso (not flared to 90°, not tucked to 0°). Press up and very slightly in — dumbbells converge fractionally at the top. The incline specifically targets the upper pec, which is the portion that creates the aesthetic "shelf" look when developed. Control the descent over 2 seconds. Dumbbells allow greater ROM than a barbell and also train each side independently, exposing and correcting strength imbalances over time.',
  },
  declineBench: {
    n:'Decline Bench Press',
    d:'3 × 10–12 (75s)',
    s:'4 × 4–6 (2.5 min)',
    i:'Set bench to 15–30° decline. This angle specifically recruits the sternal (lower) head of the pectoralis major — the portion that creates lower chest density. Grip is the same as flat bench: just outside shoulder-width. Bar travels to lower chest. Because the decline angle puts your shoulder joint in a safer position than flat or incline, many lifters can handle more weight here. Retract scapula, control the descent, drive through heels of palms. Spot is recommended at heavy weights due to the head-down position. Use a Smith machine if training alone.',
  },
  dipsChest: {
    n:'Chest Dips',
    d:'3 × 10–12 (60s)',
    s:'4 × 6–8 (2 min)',
    i:'Grip the dip bars and lean your torso forward 20–30° throughout the entire movement — this is what differentiates a chest dip from a tricep dip. If you stay upright, you shift loading to the triceps. Lower until elbows reach 90° or until you feel a stretch across the chest — do not push into shoulder impingement territory. Drive through the heels of the palms to return. At the top, squeeze the chest by thinking about pushing the handles toward each other. When bodyweight becomes easy for 12+ reps, add weight via a dip belt. EMG data confirms dips produce comparable pec activation to the bench press with greater lower pec emphasis.',
  },
  cableFly: {
    n:'Cable Crossover',
    d:'3 × 12–15 (60s)',
    s:'3 × 10–12 (75s)',
    i:'Set cables at shoulder height (mid-chest variation) or above (lower pec emphasis) or below (upper pec emphasis). Step forward so cables form a Y shape behind you — you should feel a stretch in the chest at the start of every rep. Slight forward lean from the hips. Maintain a fixed, soft elbow bend throughout — changing elbow angle mid-rep turns this into a pressing movement. Lead with the elbow, not the hand. Think "hugging a barrel." At the center, cross one hand over the other and squeeze for a full 1-second peak contraction — this full adduction is unique to cable and fly movements. Return with complete 3-second control. The cable maintains tension through the entire arc, unlike dumbbells which go slack at the bottom.',
  },
  lowCableFly: {

    d:'3 × 12–15 (60s)',
    s:'3 × 10 (75s)',

  },
  pecFly: {

    d:'3 × 15 (45s)',
    s:'3 × 10 (90s)',
    i:'Adjust the seat height so the handles align exactly with mid-chest when you grip them — an inch up or down changes the loading angle significantly. Set the start position to where you feel a genuine stretch, not pain. From there, squeeze the pecs to bring the handles together — stop just before they touch to maintain continuous tension on the muscle. At the end position, hold for a full 1-second contraction. Return slowly over 3 seconds. The fly machine is excellent for definition work because the strength curve is similar to a cable fly — constant tension throughout. Drop sets are highly effective here: hit your reps to near-failure, immediately reduce weight by 20%, go to failure again.',
  },
  chestPress: {
    n:'Chest Press Machine',

    s:'4 × 8 (90s)',

  smithBench: {

  dbFly: {

  // ═══════════════════════════════════════════════════════
  // BACK — 10 modules
  // Primary drivers: latissimus dorsi, rhomboids, mid-trap,
  // teres major, rear delt, erector spinae
  // Science: vertical pulls = lat width; horizontal pulls = thickness;
  // both required for complete back development
  // ═══════════════════════════════════════════════════════

  pullUp: {
    n:'Pull-Ups',
    d:'3 × max (90s)',
    s:'5 × 4–6 (3 min)',
    i:'The foundational vertical pull. Dead hang at the start of every rep — no kipping, no partial ROM. Initiate the movement by depressing the scapula first, before the elbow bends at all. Think "shoulder blades into your back pockets." Pull elbows down and back toward your hips — not out to the sides. Chin clears the bar at the top. Lower under full control over 3 seconds — the eccentric is where significant strength and mass gains occur. A 3-second negative pull-up builds back thickness faster than a fast-rep set. Add weight via dip belt once you can complete 10+ reps with perfect form. Grip options: pronated (wider, more lat), supinated (chin-up, more bicep involvement), neutral (easiest on wrists).',
  },
  latPulldown: {
    n:'Lat Pulldown',
    d:'4 × 10–12 (75s)',
    s:'4 × 6–8 (2 min)',
    i:'Grip the bar slightly wider than shoulder-width, overhand. Sit with thighs locked under the pad. Lean back very slightly — about 10–15° — before you begin pulling. The scapula must depress and retract before the elbows bend: this is the most commonly skipped step and the reason most people do not feel this in their lats. Pull the bar to your upper chest, driving elbows down and back toward your hips. At the bottom, hold 1 second and squeeze the lats hard. Return over 3 seconds — let the lats fully stretch at the top. Never use momentum. The lat pulldown directly mimics the pull-up movement pattern and is the primary lat isolation movement available.',
  },
  closeGripPulldown: {
    n:'Close-Grip Pulldown',
    d:'3 × 12 (60s)',
    s:'3 × 8 (90s)',
    i:'Use a narrow neutral-grip attachment (V-bar or parallel handles). This grip brings the elbows closer to the body during the pull, increasing the range of motion at the shoulder joint and creating a deeper lat stretch at the top. Pull the handles to your sternum, elbows driving down into your sides. The close grip also increases bicep involvement, making this a good bridge movement on arm-plus-back days. Same scapular initiation applies — depress before pulling. Squeeze hard at the bottom. 3-second return.',
  },
  cableRow: {
    n:'Seated Cable Row',
    d:'4 × 10–12 (75s)',
    s:'4 × 6–8 (2 min)',
    i:'Sit upright with a slight forward lean at the start — this stretches the lats and rhomboids before each rep, increasing ROM and muscle activation. Drive the elbows back close to the torso — not flared outward. Squeeze the shoulder blades together hard at full contraction and hold for 1 second. Return with control, allowing the torso to hinge slightly forward to increase the lat stretch. Do not use body momentum — all power should come from the back, not a hip hinge. Use a neutral-grip V-bar for maximum range, or a wide bar to increase outer lat involvement. This is the primary horizontal pull for mid-back thickness.',
  },
  wideRow: {
    n:'Wide-Grip Cable Row',
    d:'3 × 12 (75s)',
    s:'3 × 8 (90s)',
    i:'Attach a wide straight bar to the low cable. Sit upright, grip the bar with a wide overhand grip. Pull the bar to your lower chest/upper abdomen, flaring the elbows out to about 45°. This wide-grip position shifts emphasis from the mid-back and rhomboids to the outer lats and teres major — creating more lat width rather than thickness. At full contraction, the elbows should be behind the plane of the torso. Return slowly. The wide row pairs well with close-grip rows in longer back sessions to hit different portions of the lat.',
  },
  straightPull: {
    n:'Straight-Arm Pulldown',
    d:'3 × 15 (45s)',
    s:'3 × 12 (60s)',
    i:'Stand facing the cable stack, lat bar or rope attached at the top. Arms extended in front of you with a fixed soft elbow bend — this bend does not change during the movement. Pull the bar down in a wide arc from in front of your face to your hips, using only the lats. The elbow does not flex. This is pure lat isolation with no bicep involvement whatsoever, making it excellent for building the lat-to-arm connection — learning to feel the lat working independently. Feel a deep stretch at the top and a hard contraction at the bottom. Core braced throughout. Great warm-up movement or burnout finisher.',
  },
  singleArmRow: {

    s:'3 × 8 each (90s)',

  },
  underhandPulldown: {

    d:'3 × 12 (60s)',

  },
  ropeRow: {

  },
  facePull: {
    n:'Face Pull',
    d:'3 × 20 (45s)',
    s:'3 × 15 (60s)',
    i:'Set the cable to face height, rope attachment. Pull toward your face — specifically toward your forehead — separating the rope ends as you go. At the end position, externally rotate both shoulders so your hands end up beside your ears. Elbows stay high throughout, parallel to the floor. This movement targets the posterior deltoid, infraspinatus, and teres minor — muscles that are critically undertrained in most programs that emphasize pressing. Weak posterior delts and external rotators are the primary cause of shoulder injuries in pressing athletes. Do these every single session. High reps are appropriate because these muscles respond to volume.',
  },

  // ═══════════════════════════════════════════════════════
  // TRICEPS — 9 modules

  triPushdown: {

    d:'4 × 12–15 (60s)',
    s:'4 × 8–10 (90s)',
    i:'Stand close to the cable stack. Elbows pinned firmly to your sides throughout — if they drift forward or flare, the movement becomes a shoulder exercise. Use the rope attachment. Push down to full elbow extension, and at the bottom, flare the rope ends apart — this spreads the load across all three tricep heads simultaneously and maximizes the squeeze. Lock out fully at the bottom. Return over 2 seconds — do not let the rope snap back. The pushdown is the most complete tricep isolation movement for volume work because it keeps constant cable tension through the entire ROM and is joint-friendly for high rep sets.',
  },
  barPushdown: {
    n:'Straight Bar Pushdown',
    d:'3 × 12–15 (60s)',
    s:'4 × 8–10 (90s)',
    i:'Same cable setup as the rope pushdown but using a straight or EZ bar attachment. The bar locks the hands in a fixed position, which increases the demand on the medial and lateral heads specifically. Elbows pinned to sides. Push to full lockout. The bar allows more weight than the rope typically, making it better for heavier strength-focused sets. Overhand grip is standard. An underhand (reverse) grip shifts emphasis to the long head and is a useful variation on subsequent sessions.',

  skullCrusher: {
    n:'Skull Crushers',
    d:'4 × 10–12 (60s)',
    s:'4 × 5–6 (2.5 min)',
    i:'Lie flat on a bench. Use an EZ-bar or dumbbells — the EZ-bar is easier on the wrists. Hold the weight above your chest with a narrow grip. Lower by hinging ONLY at the elbow — the upper arm stays fixed, vertical, and does not move during the rep. Lower the bar toward your forehead or, for greater long head stretch, slightly behind the head. Extend back to start. The long head of the tricep gets its maximum stretch when the arm is overhead or slightly behind the head, making skull crushers superior to pushdowns for long head hypertrophy. This is a foundational strength movement for the tricep. Control the descent — do not let gravity drop the bar.',
  },
  dipsTri: {
    n:'Tricep Dips',
    d:'3 × 12–15 (60s)',
    s:'4 × 6–8 (2 min)',
    i:'Grip the dip bars with hands close together. Stay upright — do not lean forward (that shifts the load to chest). Elbows track straight back, close to the body, throughout the entire rep. Lower until elbows reach 90° — going deeper than 90° adds shoulder impingement risk without meaningfully increasing tricep stretch. Drive through the heels of the palms back to full extension. At the top, lock out the elbow and squeeze the tricep hard. Add weight via dip belt once 15 bodyweight reps become easy. Dips are one of the only tricep compound movements and are excellent for overall mass.',
  },
  ohTricep: {
    n:'Overhead Tricep Extension',
    d:'3 × 12 (75s)',
    s:'3 × 8–10 (90s)',
    i:'Seated or standing. Hold one heavy dumbbell with both hands overhead, or attach a rope to a low cable and press overhead. Lower the weight behind the head by hinging at the elbow — upper arms stay fixed, pointing straight at the ceiling throughout. Extend back to full lockout overhead. The overhead position is the ONLY position where the long head of the tricep is fully lengthened. The long head is the largest of the three heads and makes up most of the tricep mass visible from the back and side. Research confirms that overhead tricep exercises produce significantly greater long head hypertrophy than pushdowns or kickbacks. This movement should be in every tricep session.',
  },
  cableOHTricep: {
    n:'Cable Overhead Extension',
    d:'3 × 12–15 (60s)',
    s:'3 × 10 (90s)',
    i:'Attach a rope to a low cable. Face away from the stack. Hold rope overhead with both hands, elbows pointing forward. Extend the elbows to straighten the arms overhead. The cable provides constant tension even at the stretched position — unlike a dumbbell where tension drops off. This gives the cable overhead extension an advantage over the dumbbell version for hypertrophy. Keep the upper arms stationary. Squeeze at the top of each rep. Return slowly to full stretch. This is an excellent alternative when a heavy dumbbell overhead extension becomes uncomfortable on the wrists.',
  },
  closeGripSmith: {
    n:'Close-Grip Smith Press',
    d:'3 × 10–12 (75s)',
    s:'4 × 5–6 (2.5 min)',
    i:'Lie on a flat bench under the Smith machine. Use a shoulder-width or slightly narrower grip. The narrow grip shifts almost all of the pressing load from the pec to the tricep. Lower the bar to your lower chest, elbows tucked close to the body. Press to full extension. The Smith machine removes the need to balance the bar with a narrow grip, making it safer than a free barbell close-grip bench. This is the heaviest tricep compound movement available on your equipment and should lead strength-focused tricep sessions. It builds mass across all three heads.',

  singleArmPushdown: {
    n:'Single-Arm Pushdown',

    s:'3 × 10 each (75s)',

  diamondPushup: {
    n:'Diamond Push-Up',
    d:'3 × max (60s)',
    s:'3 × max weighted (90s)',

  // ═══════════════════════════════════════════════════════
  // BICEPS — 9 modules

  barbellCurl: {
    n:'Barbell Curl',
    d:'4 × 8–12 (75s)',
    s:'4 × 5–6 (2 min)',
    i:'Use an EZ-bar or straight bar. Shoulder-width supinated grip. Start from complete elbow extension — a full dead hang at the bottom. Curl by flexing the elbow only: no body swing, no shoulder raising, no elbows drifting forward past the neutral position. At the top, squeeze hard. Lower over 3 seconds — the slow negative is where most of the hypertrophy stimulus occurs. The barbell curl allows the highest load of any bicep movement, making it the primary overload exercise. Research by Schoenfeld (2014) confirms that the curl performed to full elbow extension produces significantly greater bicep hypertrophy than partial ROM curls. Never cheat the bottom.',
  },
  inclineCurl: {
    n:'Incline Dumbbell Curl',
    d:'3 × 10–12 (60s)',
    s:'3 × 8 (90s)',
    i:'Set a bench to 45–60° incline. Sit back with arms hanging straight down — this creates a stretched start position that no standing curl can match. Curl from the fully extended hang, supinating the wrist as you go. The incline position places the long head of the bicep on stretch at the start, generating a greater stretch-mediated hypertrophy stimulus. Do not swing the arms forward to initiate — the upper arm must stay pinned behind the body throughout. This is the best exercise for bicep peak development because it loads the long head in its lengthened position. Control the descent fully.',
  },
  preacherCurl: {
    n:'Preacher Curl',
    d:'3 × 10–12 (60s)',
    s:'3 × 6–8 (90s)',
    i:'Drape the upper arm over the preacher pad so the pad contacts just above the elbow. This position eliminates all momentum and locks the upper arm in a fixed position. Lower to near-full extension — not past 170° of elbow extension as hyperextension under load injures the distal bicep tendon. Curl hard. The preacher pad creates maximum tension at the bottom of the movement where standard curls are mechanically weakest, making it one of the best exercises for lower bicep development. Use an EZ-bar to reduce wrist strain or a straight bar for maximum supination. Great for producing the bicep fullness near the elbow.',
  },
  hammerCurl: {
    n:'Hammer Curl',
    d:'3 × 12 (60s)',
    s:'3 × 8–10 (90s)',
    i:'Hold dumbbells in a neutral (thumb-up) grip throughout. Elbows fixed to sides. Curl to shoulder height, 1-second hold, lower over 3 seconds. The neutral grip shifts primary emphasis to the brachialis — a muscle that sits under the bicep and pushes it upward when developed, creating the appearance of greater bicep height even without additional bicep growth. The brachioradialis also receives significant stimulus. Hammer curls are non-negotiable for complete arm development. Do not rotate the wrist during the rep — keep it neutral from start to finish.',
  },
  machineCurl: {
    n:'Machine Curl',
    d:'3 × 15 (45s)',
    s:'3 × 10 (75s)',
    i:'Adjust the seat so your elbows align exactly with the machine pivot point — this is critical. Misalignment changes the strength curve and puts stress on the elbow joint. Curl through the full range. At the top, hold for a 1-second peak contraction — the machine maintains resistance at the top where free weights go slack. Return over 3 seconds. The machine curl is excellent for drop sets: hit your target reps, immediately reduce by 20% and go to failure, reduce again. This extended set technique maximizes metabolic stress for definition. Use it as a finisher.',
  },
  cableCurl: {
    n:'Cable Bicep Curl',
    d:'3 × 12–15 (60s)',
    s:'3 × 10 (75s)',
    i:'Stand facing a low cable, straight bar or EZ-bar attachment. The cable provides constant tension through the entire range of motion — unlike dumbbells or a barbell, where tension drops off at the top. Curl from full extension to full contraction. Elbows stay fixed. The cable curl is particularly effective for the top half of the movement where dumbbells become easy. Squeeze hard at the top and lower slowly. You can also use a rope attachment with a supinating wrist motion for variety. Great finisher after heavy barbell curls.',
  },
  concentrationCurl: {
    n:'Concentration Curl',
    d:'3 × 12 each (45s)',
    s:'3 × 8–10 each (75s)',
    i:'Sit on a bench, lean forward, and brace the back of the upper arm against your inner thigh. This locks the upper arm in a fixed, slightly forward position — which biases the short head (inner bicep) and creates maximum peak contraction at the top. Curl the dumbbell from full extension to your shoulder, squeezing at the top with a full supination of the wrist. No momentum possible. Lower over 3 seconds. Arnold Schwarzenegger popularized this movement for peak development, and EMG research confirms it produces the highest bicep peak contraction of any curl variation. Do all reps on one side.',
  },
  spiderCurl: {
    n:'Spider Curl',
    d:'3 × 12 (60s)',
    s:'3 × 8 (90s)',
    i:'Set an incline bench to 45–60°. Lie face-down with your chest against the pad and arms hanging straight down. Curl the dumbbells or EZ-bar from full hang to full contraction. Because the arms hang forward of the body, the short head of the bicep is preferentially recruited — producing a wide, full look to the bicep when viewed from the front. This is the opposite of the incline curl which targets the long head. Together they cover both heads optimally. The face-down position also completely eliminates any body momentum. Control every rep.',
  },
  reverseCurl: {
    n:'Reverse Curl',
    d:'3 × 12 (60s)',
    s:'3 × 10 (75s)',
    i:'Hold a barbell or EZ-bar with a pronated (overhand) grip. Curl from full extension to full contraction. The pronated grip nearly eliminates bicep involvement and places the load on the brachioradialis and brachialis — the muscles of the forearm and upper arm that sit beside and under the bicep. Developing these muscles adds visible thickness to the arm when viewed from the front, and builds the "tie-in" between the forearm and upper arm that defines aesthetically developed arms. Keep elbows fixed to sides. Lower slowly. An often-skipped movement that experienced lifters use to build the complete arm.',
  },

  ohpDB: {
    n:'Dumbbell Overhead Press',
    d:'4 × 10–12 (75s)',
    s:'5 × 4–6 (3 min)',
    i:'Seated or standing. Start with dumbbells at ear level, elbows about 30° in front of the coronal plane — not directly out to the sides, which causes shoulder impingement. Press straight up, allowing the dumbbells to converge slightly at the top. Lock out overhead without arching the lower back. Lower under full control back to ear height. The dumbbell overhead press is the primary compound shoulder movement — it trains the anterior and medial delt under high load. Dumbbells allow greater freedom of movement than a barbell and train each side independently.',
  },
  shoulderPress: {
    n:'Shoulder Press Machine',
    d:'3 × 12–15 (60s)',
    s:'4 × 8 (90s)',
    i:'Adjust the seat so handles start at ear level. Press straight up without shrugging the traps at the top — keep the shoulder down and packed. Upper back pressed firmly into the pad throughout. The machine removes stabilization demands, allowing complete focus on the deltoid contraction. Use it to push higher volume after the dumbbell press, or when fatigued and form on free weights is compromised. Full lockout at the top, full return to ear height at the bottom.',
  },
  lateralRaise: {
    n:'Cable Lateral Raise',
    d:'4 × 15–20 (45s)',
    s:'3 × 12 (60s)',
    i:'Stand perpendicular to the low cable. Slight forward lean from the hip, fixed soft elbow bend maintained throughout. Raise the arm to just above shoulder height — stopping at or just past 90°. The trap takes over above 90° and lateral delt stimulus drops. Lead with the elbow, not the hand — think of pouring water out of a jug. Slow 3-second descent. The cable maintains tension at the bottom of the arc unlike dumbbells, which makes it superior for lateral raises. This is the primary medial delt isolation movement — the medial delt is responsible for shoulder width and is only hit effectively with lateral raises.',
  },
  facePull: {
    n:'Face Pull',

// ── ABS BANK ─────────────────────────────────────────────────────────────────
// Your ab system: overload first, progressive resistance, banned movements excluded
// Definition: higher reps, more volume; Strength: heavier weight, lower reps

// ── ABS BANK ─────────────────────────────────────────────────────────────────
// Personal profile: 5'10 / 149lb / lean / goal = blocky 6-pack + oblique cuts
// Equipment: dumbbells, plates (25/35/45lb), weight balls — NO machines
// BANNED: hanging leg raises, hanging knee raises, reverse crunches, cat-cow
//
// Session structure (always): 1. Overload → 2. Builder → 3. Finisher
// Definition: 10–20 rep range, 15–30s rest, time under tension focus
// Strength: 10–12 heavy reps, 20–25s rest, max load with controlled form
//
// 3 sessions per week. At least one true overload move per session.
// Definition comes from muscle thickness + low body fat — not rep volume.
//
// Rotates across 5 distinct sessions so every 5 sessions = full variety.
// Session selected by: (slotIdx + sessionRotation) % 5
// sessionRotation increments each compile so sessions don't repeat back-to-back.

// Each session: [overload, builder, finisher]
// All exercises use EX module keys — n/d/s/i all pulled from EX library above.

const ABS_SESSIONS = [
  // Session A — Plate heavy + rollout finisher

  },

  {

  // Session E — Sit-up + Russian twist + active plank
  {

    exercises: [

      { key: 'russianTwist',     role: 'builder'   },
      { key: 'plank',            role: 'finisher'  },
    ],
  },
];

// Session rotation counter — increments each compile for variety
if (typeof window !== 'undefined' && !window._absRotation) window._absRotation = 0;

function getAbsSession(slotIdx) {
  const rot = (typeof window !== 'undefined' ? (window._absRotation || 0) : 0);
  const idx = (slotIdx + rot) % ABS_SESSIONS.length;
  const session = ABS_SESSIONS[idx];
  // Resolve exercise keys to full EX module objects
  return session.exercises.map(e => ({
    ...EX[e.key],
    role: e.role,
    label: session.label,
  }));
}

// ABS_DEF kept as alias for backward compat with getRoutine
// getRoutine now calls getAbsSession() instead
const ABS_DEF = null;
const ABS_STR = null;

// ── NOTES BANK ────────────────────────────────────────────────────────────────
const NOTES_DEF = [
  'Progressive overload is the singular driver of hypertrophy — log every weight, every session. A muscle that is not progressively challenged will not grow.',
  'Definition comes from the kitchen as much as the gym. A caloric deficit of 300–500 kcal/day while maintaining protein at 1.6–2.2g/kg bodyweight preserves muscle while revealing it.',
  'Train within 1–3 reps of failure on all working sets. Research by Schoenfeld et al. (2017) confirms proximity to failure, not load, is the primary hypertrophy stimulus.',
  'Slow your negatives. A 2–3 second eccentric phase increases time under tension and muscle damage — both drivers of hypertrophy that are lost when you let gravity do the work.',
  'Rest periods of 60–90 seconds are prescribed for a reason. Metabolic stress is a meaningful hypertrophic driver. Longer rest reduces this stimulus.',
];
const NOTES_STR = [

  'On working sets, target RPE 8–9. You should finish each set knowing you had 1–2 reps left. Grinding to absolute failure on strength lifts compromises form and CNS recovery.',

  'Warm-up sets are mandatory on strength days. 3–4 progressive sets from 40% to 80% of your working weight before your first heavy set. The CNS must be primed.',

];

// ── MAIN ROUTINE BUILDER ──────────────────────────────────────────────────────
//
// TIME MODEL (how a real session works):
//   Warmup:    5–10 min fixed (not scaled per exercise, just shown as guidance)
//   Ab block:  always 3 fixed exercises ~12 min, always closes the session
//   Main lift: fills the middle — exercise count scales with remaining time
//
// MULTI-GROUP LOGIC:
//   Total exercise count from slot table is split across ALL selected groups.
//   Example: 1h15m = 5 total exercises. Chest+Back = 2–3 each, not 5 each.
//   This mirrors how real programming works — you don't triple the volume
//   just because you train two groups in one session.
//
// PRESCRIPTION LOGIC (Bug 4 fix):
//   DEF_POOL stores definition prescriptions [key, defSets, defReps, defRest]
//   STR_POOL stores strength prescriptions [key, strSets, strReps, strRest]
//   The routine builder reads from the correct pool based on mode.
//   ex.d is set from DEF_POOL, ex.s is set from STR_POOL independently.
//   Renderer then picks ex.d or ex.s based on current workMode.

function getRoutine(groups, modeKey, slotIdx) {
  const t = SLOTS[slotIdx].v;
  const isStr = modeKey === 'str';

  // ── WARMUP ──────────────────────────────────────────────────────────────────
  // 15 min: just base cardio. 30+: add dynamic. 45+: add activation/ramp-up.
  const warmup = [WARMUPS.base];
  if (t >= 30) warmup.push(WARMUPS.dynamic);
  if (t >= 45) warmup.push(isStr ? WARMUPS.strWarmup : WARMUPS.activate);

  // ── MAIN EXERCISES ──────────────────────────────────────────────────────────
  // Total exercises for the session (shared across all selected groups)
  const totalEx = isStr ? STR_EX_COUNT[slotIdx] : DEF_EX_COUNT[slotIdx];
  const numGroups = Math.max(1, groups.length);

  // Each group gets a fair share. Compound groups (chest, back) always get
  // at least 1; compound-heavy sessions cap at pool depth.
  const basePerGroup = Math.max(1, Math.floor(totalEx / numGroups));
  const remainder    = totalEx - (basePerGroup * numGroups);

  const main = [];
  groups.forEach((g, gi) => {
    const defPool = DEF_POOL[g] || [];
    const strPool = STR_POOL[g] || [];
    const count   = Math.min(
      basePerGroup + (gi < remainder ? 1 : 0),
      defPool.length  // never exceed what's in the pool
    );

    for (let i = 0; i < count; i++) {
      const defEntry = defPool[i];
      const strEntry = strPool[i] || defPool[i]; // fallback if str pool shorter
      if (!defEntry) continue;
      const [key, dSets, dReps, dRest] = defEntry;
      const [,    sSets, sReps, sRest] = strEntry;
      const base = EX[key];
      if (!base || main.find(e => e.key === key)) continue;
      main.push({
        ...base,
        key,
        d: `${dSets} × ${dReps} (${dRest})`,  // definition prescription
        s: `${sSets} × ${sReps} (${sRest})`,  // strength prescription
      });
    }
  });

  // ── ABS ─────────────────────────────────────────────────────────────────────
  // Always 3 fixed exercises. Never scales with time — this is a 12-min block.
  // ABS_DEF uses {n, d, s, i} format so the renderer can apply mode correctly.
  // Abs: structured 3-exercise session (overload → builder → finisher)
  // Rotates across 5 preset sessions for variety. Never scaling with time.
  const abs = getAbsSession(slotIdx);
  if (typeof window !== 'undefined') window._absRotation = ((window._absRotation || 0) + 1) % 5;

  // ── NOTES ───────────────────────────────────────────────────────────────────
  const noteBank  = isStr ? NOTES_STR : NOTES_DEF;
  const noteStart = slotIdx % (noteBank.length - 1);
  const notes     = [noteBank[noteStart], noteBank[noteStart + 1]];

  return { warmup, main, abs, notes };
}

function initPicker() {
  const ps = document.getElementById('ps'); if (!ps) return;
  ps.scrollTop = st.tidx * 40;

    if (!raf) { raf = true; requestAnimationFrame(() => {

}

      const sets = workMode==='str' ? (ex.s||ex.d) : ex.d;
      const roleColor = ex.role==='overload' ? 'var(--accent)' : ex.role==='builder' ? 'var(--mid)' : 'var(--fog)';
      return `<div class="ex-row" onclick="toggleInfo('core${i}')">
        <div class="ex-main">
          <div style="display:flex;flex-direction:column;gap:.15rem;flex:1;min-width:0;">
            <span style="font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:${roleColor};font-family:'Courier Prime',monospace;transition:color .55s ease;">${ex.role||''}</span>
            <span class="ex-name">${ex.n}</span>
          </div>
          <div style="display:flex;align-items:center;flex-shrink:0;">
            <span class="ex-sets" style="color:${color};">${sets}</span>
            <span class="chev" id="chv-core${i}" style="color:var(--fog);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
          </div>
        </div>
        <div class="info-card" id="inf-core${i}"><div class="info-text">${ex.i}</div></div>
      </div>`;
    }).join('')}
    <!-- PRE-CONFIG HIIT BUTTON -->
    <div style="padding:.75rem 1.1rem;border-top:1px solid var(--border);transition:border-color .55s ease;">
      <button class="btn-hiit" onclick="preConfigHIIT()">
        <span style="display:flex;align-items:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
        <span>Pre-Config HIIT from Core</span>
        <span style="margin-left:auto;display:flex;align-items:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
      </button>
    </div>
  </div>`;
}

function toggleInfo(uid) {
  const card = document.getElementById(`inf-${uid}`);
  const chev = document.getElementById(`chv-${uid}`);
  if (!card) return;
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.info-card.open').forEach(c=>c.classList.remove('open'));
  document.querySelectorAll('.chev.open').forEach(c=>c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open'); chev&&chev.classList.add('open');
    setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),120);
  }
}

// ─── PRE-CONFIG HIIT ──────────────────────────────────────────────────────────
function preConfigHIIT() {
  if (!st.workout||!st.workout.abs) return;
  // Map abs to HIIT ex IDs
  // Pre-config uses only approved ab movements — no banned exercises
  const hiitIds = ['weightedCrunchHIIT','straightLegHIIT','mtnClimb','highKnee'];
  st.hiitMode = 'queue';
  st.hiitWork = 40;
  st.hiitRest = 20;
  st.hiitRounds = 4;
  st.hiitExIds = hiitIds;
  st.hiitPreloaded = true;
  st.hiitRunning = false;
  st.hiitCurrentRound = 1;
  st.hiitCurrentEx = 0;
  st.hiitPhase = 'work';
  st.hiitSeconds = st.hiitWork;
  switchTab('timer');
}

// ─── HIIT TIMER ───────────────────────────────────────────────────────────────
const CIRC = 2 * Math.PI * 90; // radius 90

function renderTimer() {
  const el = document.getElementById('scr-timer');
  const exList = HIIT_EX.filter(e => st.hiitExIds.includes(e.id));
  const totalRounds = st.hiitMode==='free' ? st.hiitRounds : st.hiitRounds * exList.length;
  const maxSec = st.hiitPhase==='work' ? st.hiitWork : st.hiitRest;
  const prog = st.hiitSeconds / maxSec;
  const dash = CIRC * prog;
  const phaseColor = st.hiitPhase==='work' ? 'var(--accent)' : 'var(--mid)';

  // Current exercise name
  let curExName = '—';
  if (st.hiitMode==='queue' && exList.length>0) {
    curExName = exList[st.hiitCurrentEx % exList.length]?.n || '—';
  }

  el.innerHTML = `
    <!-- Mode tabs -->
    <div style="display:flex;gap:.5rem;margin-bottom:1.5rem;">
      <button onclick="setHiitMode('free')" style="flex:1;padding:.65rem;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.1em;cursor:pointer;border:1px solid var(--border);background:${st.hiitMode==='free'?'var(--accent)':'var(--surface)'};color:${st.hiitMode==='free'?'var(--bg)':'var(--fog)'};transition:all .2s ease;">Free Timer</button>
      <button onclick="setHiitMode('queue')" style="flex:1;padding:.65rem;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.1em;cursor:pointer;border:1px solid var(--border);background:${st.hiitMode==='queue'?'var(--accent)':'var(--surface)'};color:${st.hiitMode==='queue'?'var(--bg)':'var(--fog)'};transition:all .2s ease;">Exercise Queue</button>
    </div>

    ${st.hiitPreloaded?`<div style="padding:.6rem 1rem;background:var(--surface);border-left:3px solid var(--accent);margin-bottom:1.25rem;font-size:.72rem;color:var(--accent);letter-spacing:.08em;transition:all .55s ease;"><span style="display:inline-flex;align-items:center;gap:.4rem;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Pre-loaded from Core Block</span></div>`:''}

    <!-- Timer ring -->
    <div class="timer-ring-wrap">
      <div class="timer-circle">
        <svg class="timer-svg" width="220" height="220" viewBox="0 0 220 220">
          <circle class="ring-bg" cx="110" cy="110" r="90"/>
          <circle class="ring-prog" cx="110" cy="110" r="90"
            stroke="${phaseColor}"
            stroke-dasharray="${CIRC}"
            stroke-dashoffset="${CIRC - dash}"/>
        </svg>
        <div class="timer-inner">
          <div class="timer-phase" style="color:${phaseColor};">${st.hiitRunning||(st.hiitSeconds<maxSec)?st.hiitPhase.toUpperCase():'READY'}</div>
          <div class="timer-time">${String(Math.floor(st.hiitSeconds/60)).padStart(2,'0')}:${String(st.hiitSeconds%60).padStart(2,'0')}</div>
          ${st.hiitMode==='queue'?`<div class="timer-round" style="font-size:.75rem;text-align:center;max-width:120px;line-height:1.3;">${curExName}</div>`:''}
          <div class="timer-round">Round ${st.hiitCurrentRound} / ${st.hiitRounds}</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="timer-ctrl">
      <button class="tc-btn" onclick="resetTimer()" title="Reset"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg></button>
      <button class="tc-btn primary" onclick="toggleTimer()">${st.hiitRunning?`<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`:`<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`}</button>
      <button class="tc-btn" onclick="skipPhase()" title="Skip"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><rect x="17" y="4" width="2" height="16"/></svg></button>
    </div>

    <!-- Config -->
    ${!st.hiitRunning ? renderTimerConfig(exList) : ''}
  `;
}

function renderTimerConfig(exList) {
  return `
    <!-- Intervals config -->
    <div style="margin-bottom:1.5rem;">
      <div style="font-size:.57rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem;">
        Intervals<div style="flex:1;height:1px;background:var(--border);"></div>
      </div>
      <div style="display:flex;gap:1rem;align-items:center;justify-content:center;margin-bottom:1rem;">
        <div style="text-align:center;">
          <div style="font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--fog);margin-bottom:.4rem;">Work</div>
          <div style="display:flex;align-items:center;gap:.4rem;">
            <button onclick="adjTime('work',-5)" style="width:28px;height:28px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;">−</button>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--text);min-width:50px;text-align:center;transition:color .55s ease;">${st.hiitWork}s</div>
            <button onclick="adjTime('work',5)" style="width:28px;height:28px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;">+</button>
          </div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--border);">/</div>
        <div style="text-align:center;">
          <div style="font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--fog);margin-bottom:.4rem;">Rest</div>
          <div style="display:flex;align-items:center;gap:.4rem;">
            <button onclick="adjTime('rest',-5)" style="width:28px;height:28px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;">−</button>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--text);min-width:50px;text-align:center;transition:color .55s ease;">${st.hiitRest}s</div>
            <button onclick="adjTime('rest',5)" style="width:28px;height:28px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;">+</button>
          </div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--border);">/</div>
        <div style="text-align:center;">
          <div style="font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--fog);margin-bottom:.4rem;">Rounds</div>
          <div style="display:flex;align-items:center;gap:.4rem;">
            <button onclick="adjRounds(-1)" style="width:28px;height:28px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;">−</button>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--text);min-width:36px;text-align:center;transition:color .55s ease;">${st.hiitRounds}</div>
            <button onclick="adjRounds(1)" style="width:28px;height:28px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s ease;">+</button>
          </div>
        </div>
      </div>
    </div>

    ${st.hiitMode==='queue' ? renderExQueue(exList) : renderHiitExPicker()}
  `;
}

function renderExQueue(exList) {
  return `
    <div>
      <div style="font-size:.57rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem;">
        Exercise Queue<div style="flex:1;height:1px;background:var(--border);"></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);margin-bottom:.75rem;transition:background .55s ease,border-color .55s ease;">
        ${exList.length===0
          ? `<div style="padding:1.25rem;text-align:center;font-size:.75rem;color:var(--fog);font-style:italic;">Select exercises below</div>`
          : exList.map((ex,i)=>`
            <div class="q-item ${i===st.hiitCurrentEx?'active-ex':''}">
              <span class="q-num ${i===st.hiitCurrentEx?'cur':''}">${i+1}</span>
              <span class="q-name">${ex.n}</span>
              <span class="q-dur">${ex.work}s/${ex.rest}s</span>
              <button onclick="removeHiitEx('${ex.id}')" style="background:transparent;border:none;color:var(--fog);cursor:pointer;font-size:1rem;padding:.25rem;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>`).join('')}
      </div>
      ${renderHiitExPicker()}
    </div>`;
}

function renderHiitExPicker() {
  return `
    <div>
      <div style="font-size:.57rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem;">
        ${st.hiitMode==='queue'?'Add Exercises':'HIIT Exercises (info)'}<div style="flex:1;height:1px;background:var(--border);"></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:.4rem;">
        ${HIIT_EX.map(ex=>`
          <div class="hchip ${st.hiitExIds.includes(ex.id)?'on':''}" onclick="toggleHiitEx('${ex.id}')">${ex.n}</div>
        `).join('')}
      </div>
    </div>`;
}

// ─── TIMER LOGIC ──────────────────────────────────────────────────────────────
function toggleTimer() {
  if (st.hiitRunning) {
    clearInterval(st.hiitInterval);
    st.hiitRunning = false;
  } else {
    st.hiitRunning = true;
    st.hiitInterval = setInterval(timerTick, 1000);
  }
  updateTimerUI();
}

function timerTick() {
  st.hiitSeconds--;
  if (st.hiitSeconds <= 0) {
    // Phase complete
    if (st.hiitPhase === 'work') {
      st.hiitPhase = 'rest';
      st.hiitSeconds = st.hiitRest;
    } else {
      // Rest done — next round or next exercise
      st.hiitPhase = 'work';
      if (st.hiitMode === 'queue') {
        const exList = HIIT_EX.filter(e => st.hiitExIds.includes(e.id));
        st.hiitCurrentEx++;
        if (st.hiitCurrentEx >= exList.length) {
          st.hiitCurrentEx = 0;
          st.hiitCurrentRound++;
        }
      } else {
        st.hiitCurrentRound++;
      }
      if (st.hiitCurrentRound > st.hiitRounds) {
        // Done
        clearInterval(st.hiitInterval);
        st.hiitRunning = false;
        st.hiitCurrentRound = st.hiitRounds;
        st.hiitSeconds = 0;
        renderTimer(); return;
      }
      st.hiitSeconds = st.hiitWork;
    }
  }
  updateTimerUI();
}

function updateTimerUI() {
  // Update just the dynamic parts without full re-render
  const maxSec = st.hiitPhase==='work' ? st.hiitWork : st.hiitRest;
  const prog = st.hiitSeconds / maxSec;
  const dash = CIRC * prog;
  const phaseColor = st.hiitPhase==='work' ? 'var(--accent)' : 'var(--mid)';
  const exList = HIIT_EX.filter(e => st.hiitExIds.includes(e.id));
  const curExName = st.hiitMode==='queue' && exList.length>0 ? exList[st.hiitCurrentEx%exList.length]?.n||'—' : null;

  const ring = document.querySelector('.ring-prog');
  if (ring) { ring.setAttribute('stroke-dashoffset', CIRC - dash); ring.setAttribute('stroke', phaseColor); }
  const timeEl = document.querySelector('.timer-time');
  if (timeEl) timeEl.textContent = `${String(Math.floor(st.hiitSeconds/60)).padStart(2,'0')}:${String(st.hiitSeconds%60).padStart(2,'0')}`;
  const phaseEl = document.querySelector('.timer-phase');
  if (phaseEl) { phaseEl.textContent = st.hiitRunning ? st.hiitPhase.toUpperCase() : 'READY'; phaseEl.style.color = phaseColor; }
  const roundEl = document.querySelector('.timer-round:last-child');
  if (roundEl) roundEl.textContent = `Round ${st.hiitCurrentRound} / ${st.hiitRounds}`;
  const exNameEl = document.querySelector('.timer-round:not(:last-child)');
  if (exNameEl && curExName) exNameEl.textContent = curExName;
  const playBtn = document.querySelector('.tc-btn.primary');
  if (playBtn) playBtn.innerHTML = st.hiitRunning ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>` : `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`;
}

function resetTimer() {
  clearInterval(st.hiitInterval);
  st.hiitRunning = false;
  st.hiitPhase = 'work';
  st.hiitSeconds = st.hiitWork;
  st.hiitCurrentRound = 1;
  st.hiitCurrentEx = 0;
  renderTimer();
}

function skipPhase() {
  st.hiitSeconds = 1;
  if (!st.hiitRunning) timerTick();
}

function adjTime(type, delta) {
  if (type==='work') st.hiitWork = Math.max(5, st.hiitWork + delta);
  else st.hiitRest = Math.max(5, st.hiitRest + delta);
  if (!st.hiitRunning) { st.hiitSeconds = st.hiitPhase==='work' ? st.hiitWork : st.hiitRest; }
  renderTimer();
}

function adjRounds(delta) {
  st.hiitRounds = Math.max(1, st.hiitRounds + delta);
  renderTimer();
}

function setHiitMode(m) {
  st.hiitMode = m;
  st.hiitPreloaded = false;
  renderTimer();
}

function toggleHiitEx(id) {
  if (st.hiitExIds.includes(id)) {
    st.hiitExIds = st.hiitExIds.filter(x=>x!==id);
  } else {
    st.hiitExIds.push(id);
  }
  renderTimer();
}

function removeHiitEx(id) {
  st.hiitExIds = st.hiitExIds.filter(x=>x!==id);
  renderTimer();
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
let currentTab = 'build';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-build-content').style.display = tab==='build' ? '' : 'none';
  document.getElementById('tab-timer-content').style.display = tab==='timer' ? '' : 'none';
  document.getElementById('tab-build').classList.toggle('active', tab==='build');
  document.getElementById('tab-timer').classList.toggle('active', tab==='timer');
  if (tab==='timer') renderTimer();
  document.getElementById('scroll-area').scrollTop = 0;
}

// ─── BUILD SCREEN SWITCH ──────────────────────────────────────────────────────
function showBuildScreen(name) {
  const cfg = document.getElementById('scr-cfg');
  const res = document.getElementById('scr-res');
  cfg.style.display = name==='cfg' ? '' : 'none';
  res.style.display = name==='res' ? '' : 'none';
  document.getElementById('scroll-area').scrollTop = 0;
  [cfg,res].forEach(el=>{el.classList.remove('screen');void el.offsetWidth;el.classList.add('screen');});
  if (name==='cfg') renderConfig();
  if (name==='res') renderResult();
}

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

// ─── INIT ─────────────────────────────────────────────────────────────────────
applyTheme();
showBuildScreen('cfg');
</script>
